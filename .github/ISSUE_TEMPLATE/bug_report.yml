name: Bug Report
description: Report a reproducible bug in qon-js.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail for us to reproduce quickly.

  - type: input
    id: version
    attributes:
      label: qon-js version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: qon version
    attributes:
      label: qon version
      placeholder: 0.1.0

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: 20.11.1
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code sample and exact steps.
      placeholder: |
        1. Install package
        2. Run this code
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and stack traces
      render: shell
